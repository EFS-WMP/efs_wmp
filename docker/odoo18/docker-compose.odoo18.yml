services:
  odoo18:
    image: odoo:18.0
    container_name: odoo18
    depends_on:
      - db18
    ports:
      - "8070:8069"
      - "8072:8072"
    volumes:
      - odoo18-web-data:/var/lib/odoo
      - "C:\\odoo_dev\\addons\\common\\itad_core:/mnt/extra-addons-custom/itad_core"
      - "C:\\odoo_dev\\addons\\odoo18:/mnt/extra-addons-odoo18"
      - "C:\\odoo_dev\\docker\\odoo18\\odoo.conf:/etc/odoo/odoo.conf:ro"

    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]
    restart: unless-stopped

  db18:
    image: postgres:15
    container_name: db18
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo18-db-data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped

volumes:
  odoo18-web-data:
  odoo18-db-data:
