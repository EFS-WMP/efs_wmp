services:
  odoo18:
    image: odoo:18.0
    depends_on:
      - db18
    ports:
      - "8070:8069"
      - "8072:8072"
    volumes:
       - odoo18-web-data:/var/lib/odoo
       - "../../addons/common:/mnt/extra-addons-custom"
       - "../../addons/odoo18:/mnt/extra-addons-odoo18"
       - "../..:/mnt/odoo-dev:ro"
       - "./odoo.conf:/etc/odoo/odoo.conf:ro"
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]
    restart: unless-stopped

  db18:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo18-db-data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped

volumes:
  odoo18-web-data:
  odoo18-db-data:
